name: software_engineering_demo
code: SED
setup_home_script: flow:setup/prepare_home.sh
start_agent: 01_architect
agents:
  01_architect:
    timeout_sec: 900
    allowed_skills: [demo-git, repo-search]
    allowed_mcps: []
  02_architect_reviewer:
    timeout_sec: 900
    allowed_skills: [demo-git, repo-search]
    allowed_mcps: []
  03_developer:
    timeout_sec: 900
    allowed_skills: [demo-git, repo-search, pytest-local]
    allowed_mcps: []
  04_developer_reviewer:
    timeout_sec: 900
    allowed_skills: [demo-git, repo-search]
    allowed_mcps: []
  05_qa_docs_tester:
    timeout_sec: 900
    allowed_skills: [demo-git, repo-search, pytest-local]
    allowed_mcps: []
  06_qa_reviewer:
    timeout_sec: 900
    allowed_skills: [demo-git, repo-search]
    allowed_mcps: []
runtime:
  adapter: codex
  max_command_turns: 12
  guarded_git_repos:
    - home:repos/demo_repo
  adapter_args:
    model: gpt-5.4
    reasoning_effort: medium
