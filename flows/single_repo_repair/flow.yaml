name: single_repo_repair
start_agent: 01_scope_lead
setup_home_script: setup/prepare_home.sh
agents:
  01_scope_lead:
    timeout_sec: 1800
    allowed_skills:
      - repo-search
    allowed_mcps:
      - fixture-repo
  02_change_engineer:
    timeout_sec: 2700
    allowed_skills:
      - repo-search
      - pytest-local
    allowed_mcps:
      - fixture-repo
  03_proof_engineer:
    timeout_sec: 1800
    allowed_skills:
      - pytest-local
      - repo-search
    allowed_mcps:
      - fixture-repo
  04_acceptance_critic:
    timeout_sec: 1200
    allowed_skills:
      - repo-search
    allowed_mcps:
      - fixture-repo
runtime:
  adapter: codex
  adapter_args:
    model: gpt-5.4
    reasoning_effort: high
    project_doc_max_bytes: 0
