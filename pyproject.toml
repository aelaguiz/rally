[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "rally"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "PyYAML>=6,<7",
    "rich>=14,<15",
]

[project.scripts]
rally = "rally.cli:main"

[tool.doctrine.compile]
additional_prompt_roots = ["stdlib/rally/prompts"]

[tool.doctrine.emit]

[[tool.doctrine.emit.targets]]
name = "_stdlib_smoke"
entrypoint = "flows/_stdlib_smoke/prompts/AGENTS.prompt"
output_dir = "flows/_stdlib_smoke/build/agents"

[[tool.doctrine.emit.targets]]
name = "poem_loop"
entrypoint = "flows/poem_loop/prompts/AGENTS.prompt"
output_dir = "flows/poem_loop/build/agents"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
