name: PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bundled-assets:
    name: bundled-assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out Rally
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: rally

      - name: Check out Doctrine (editable sibling)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: aelaguiz/doctrine
          fetch-depth: 0
          persist-credentials: false
          path: doctrine

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            rally/pyproject.toml
            rally/uv.lock

      - name: Sync Python dependencies
        working-directory: rally
        run: uv sync --dev

      - name: Check bundled assets
        working-directory: rally
        run: uv run python tools/sync_bundled_assets.py --check

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - name: Check out Rally
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: rally

      - name: Check out Doctrine (editable sibling)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: aelaguiz/doctrine
          fetch-depth: 0
          persist-credentials: false
          path: doctrine

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            rally/pyproject.toml
            rally/uv.lock

      - name: Sync Python dependencies
        working-directory: rally
        run: uv sync --dev

      - name: Run unit tests
        working-directory: rally
        run: uv run pytest tests/unit -q

  packaged-install:
    name: packaged-install
    runs-on: ubuntu-latest
    steps:
      - name: Check out Rally
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: rally

      - name: Check out Doctrine (editable sibling)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: aelaguiz/doctrine
          fetch-depth: 0
          persist-credentials: false
          path: doctrine

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            rally/pyproject.toml
            rally/uv.lock

      - name: Sync Python dependencies
        working-directory: rally
        run: uv sync --dev

      - name: Check whether packaged-install proof is needed
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        working-directory: rally
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Eq '^(src/|tests/|tools/sync_bundled_assets.py|pyproject.toml|uv.lock|README.md|CHANGELOG.md|docs/VERSIONING.md|Makefile|MANIFEST.in|flows/|skills/|stdlib/|mcps/|\.github/workflows/)'; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip packaged-install lane when the external-user path is untouched
        if: steps.changes.outputs.needed != 'true'
        run: printf '%s\n' 'No runtime, release, packaging, or host-path changes in this pull request.'

      - name: Build Rally artifacts
        if: steps.changes.outputs.needed == 'true'
        working-directory: rally
        run: uv build

      - name: Run packaged install proof
        if: steps.changes.outputs.needed == 'true'
        working-directory: rally
        run: uv run pytest tests/integration/test_packaged_install.py -q
