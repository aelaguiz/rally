name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and smoke test.
        required: true
        default: main
        type: string
      publish_target:
        description: Package index to publish to.
        required: true
        default: none
        type: choice
        options:
          - none
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHECKOUT_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
      RALLY_TEST_DOCTRINE_SOURCE: git+https://github.com/aelaguiz/doctrine.git@v1.0.1
    steps:
      - name: Check out Rally
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}
          path: rally

      - name: Check out Doctrine floor
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: aelaguiz/doctrine
          ref: v1.0.1
          persist-credentials: false
          path: doctrine

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            rally/pyproject.toml
            rally/uv.lock

      - name: Sync Python dependencies
        working-directory: rally
        run: uv sync --dev

      - name: Check bundled assets
        working-directory: rally
        run: uv run python tools/sync_bundled_assets.py --check

      - name: Run unit tests
        working-directory: rally
        run: uv run pytest tests/unit -q

      - name: Build source and wheel artifacts
        working-directory: rally
        run: uv build

      - name: Run packaged install proof
        working-directory: rally
        run: uv run pytest tests/integration/test_packaged_install.py -q

      - name: Store distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: rally/dist/

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: rally
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

  publish-testpypi:
    name: publish-testpypi
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish-pypi
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
