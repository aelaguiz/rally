name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Rally
        uses: actions/checkout@v4
        with:
          path: rally

      - name: Check out Doctrine
        uses: actions/checkout@v4
        with:
          repository: aelaguiz/doctrine
          path: doctrine

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync Python dependencies
        working-directory: rally
        run: uv sync --dev

      - name: Emit flow readback
        working-directory: rally
        run: |
          uv run python -m doctrine.emit_docs --pyproject pyproject.toml --target _stdlib_smoke --target poem_loop --target software_engineering_demo

      - name: Emit Doctrine skill packages
        working-directory: rally
        run: |
          uv run python -m doctrine.emit_skill --pyproject pyproject.toml --target rally-kernel --target rally-memory --target demo-git

      - name: Run unit tests
        working-directory: rally
        run: uv run pytest tests/unit -q
