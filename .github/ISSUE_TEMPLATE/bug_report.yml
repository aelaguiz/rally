name: Bug report
description: Report a concrete Rally bug.
title: "bug: "
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us the exact runtime or CLI failure in plain English.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Smallest repro
      description: Paste the exact commands and flow name that reproduce the problem.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, adapter, and whether `../doctrine` was present.
